name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name puppisctl puppisctl.py

      - name: Package EXE
        shell: pwsh
        run: |
          Compress-Archive -Path dist\puppisctl.exe -DestinationPath "puppisctl-${{ github.ref_name }}-windows-x64.zip"

      - name: Create or Update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="puppisctl-${GITHUB_REF_NAME}-windows-x64.zip"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "$ASSET" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "$ASSET" \
              --title "puppisctl ${GITHUB_REF_NAME}" \
              --notes "Windows executable build for puppisctl."
          fi
